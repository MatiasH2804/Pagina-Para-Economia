<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Economía y Logística | Base Datos</title>

<link
  rel="icon"
  type="image/png"
  href="https://raw.githubusercontent.com/MatiasH2804/Pagina-Para-Economia/main/Grupo%20Misionero%20%281%29.png"
/>

<link
  rel="apple-touch-icon"

<link rel="stylesheet" href="styles.css">
